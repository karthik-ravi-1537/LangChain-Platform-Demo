name: langchain-platform-demo
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24.0
  - pandas>=2.0.0
  - requests>=2.31.0
  - beautifulsoup4>=4.12.0
  - pytest>=7.4.0
  - black>=23.0.0
  - flake8>=6.0.0
  - pip:
    # Core LangChain dependencies (updated versions)
    - langchain>=0.3.0
    - langchain-community>=0.3.0
    - langchain-core>=0.3.0
    - langchain-openai>=0.3.0
    # LangGraph for workflow orchestration
    - langgraph>=0.5.0
    # LangSmith for monitoring and tracing
    - langsmith>=0.4.0
    # Vector database for RAG
    - faiss-cpu>=1.7.4
    # Additional dependencies
    - python-dotenv>=1.0.0
    # LangChain hub for prompt templates
    - langchainhub>=0.1.0
    # Optional: For document processing
    - pypdf>=3.15.0
    - python-docx>=0.8.11
    # Optional: For advanced search (requires API key)
    - google-search-results>=2.4.0